<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <title>FGE | Official Home</title>
    <style>
        :root {
            --primary-glow: #00d4ff;
            --bg-dark: #0a0a0c;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }

        /* Hero Section */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            text-shadow: 0 0 20px var(--primary-glow);
            letter-spacing: 5px;
        }

        p.tagline {
            font-size: 1.2rem;
            color: #ccc;
            margin-top: 10px;
        }

        /* Layout Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 3fr 1fr; /* Main content vs Sidebar for Ads */
            gap: 20px;
        }

        /* Main Content Glass Cards */
        .main-showcase {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            padding: 25px;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-glow);
        }

        /* Ad Slots (Ready for your future ads) */
        .ad-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ad-placeholder {
            background: #151518;
            border: 1px dashed #444;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            min-height: 400px;
            font-size: 0.9rem;
        }

        .banner-ad {
            width: 300px;
            height: 250px;
            background: #151518;
            margin-bottom: 20px;
            border: 1px dashed #444;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
        }

        .btn {
            background: var(--primary-glow);
            color: black;
            padding: 10px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }

        footer {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>FGE</h1>
        <p class="tagline">Friend Group Entertainment</p>
    </header>

    <div class="container">
        <div class="main-showcase">

            <div class="glass-card">
                <h2>Latest Episode</h2>
                <p>No episodes available at the moment.</p>
                <!-- <a href="#" class="btn">WATCH NOW</a> -->
            </div>

            <div class="glass-card">
                <h2>Upcoming Episodes</h2>
                <ul>
                    <li>Soon: Tourney #1</li>
                </ul>
            </div>
        </div>
        
        <div class="glass-card">
            <div class="ad-sidebar">
                <p>Stay in touch with FGE!</p>
                <p><a href="https://discord.gg/xmfACQkUFh" target="_blank">Click here to join our discord community!</a></p>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 FGE. All rights reserved.
    </footer>
    
    <script type="text/javascript">
    aclib.runAutoTag({
        zoneId: 'bhcfboa9ku',
    });
    </script>
</body>
</html>
